<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <rect width="1280" height="320" fill="#0a0a0a"/>
  <!-- CAUTION tape top -->
  <rect x="0" y="0" width="1280" height="40" fill="#ffcc00"/>
  <text x="640" y="28" font-family="'Impact', 'Arial Black', sans-serif" font-size="24" fill="#0a0a0a" text-anchor="middle" letter-spacing="12">CAUTION — CAUTION — CAUTION — CAUTION — CAUTION</text>
  <!-- AUTHORIZED PERSONNEL ONLY tape bottom -->
  <rect x="0" y="280" width="1280" height="40" fill="#ffcc00"/>
  <text x="640" y="308" font-family="'Impact', 'Arial Black', sans-serif" font-size="24" fill="#0a0a0a" text-anchor="middle" letter-spacing="8">AUTHORIZED PERSONNEL ONLY — AUTHORIZED PERSONNEL ONLY</text>
  <!-- Hazard stripes left and right -->
  <defs>
    <pattern id="hz" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="20" fill="#ffcc00"/>
      <rect x="10" width="10" height="20" fill="#0a0a0a"/>
    </pattern>
  </defs>
  <rect x="0" y="40" width="20" height="240" fill="url(#hz)"/>
  <rect x="1260" y="40" width="20" height="240" fill="url(#hz)"/>
  <!-- Center content — content area y=40..280 (240px), midpoint=160 -->
  <!-- IBKR: letter-spacing=-2, 4 chars, trailing offset = -1px (negligible) -->
  <text x="640" y="155" font-family="'Courier New', monospace" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">IBKR</text>
  <!-- TELEGRAM: letter-spacing=18, 8 chars, trailing offset = +9px — shift x right to compensate -->
  <text x="649" y="210" font-family="'Courier New', monospace" font-size="40" fill="#ffcc00" text-anchor="middle" letter-spacing="18">TELEGRAM</text>
  <!-- Tagline -->
  <text x="640" y="252" font-family="'Courier New', monospace" font-size="13" fill="#666" text-anchor="middle">Self-hosted trading bot for Interactive Brokers</text>
</svg>
