<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <g stroke="white" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/><line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>
  <!-- Chart icon -->
  <g transform="translate(100, 100)" fill="none" stroke="white" stroke-width="2.5" opacity="0.9">
    <polyline points="-30,25 -30,-25 30,-25" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="-20,15 -5,-5 10,5 25,-20" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="25" cy="-20" r="3" fill="white" fill-opacity="0.3"/>
    <!-- Telegram paper plane -->
    <g transform="translate(0,-40) scale(0.6)">
      <path d="M-18,0 L18,-8 L-2,6 Z" fill="white" fill-opacity="0.2" stroke="white" stroke-width="2"/>
      <path d="M-2,6 L4,18 L8,2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
  <text x="450" y="85" text-anchor="middle" fill="white" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold">IBKR-Telegram</text>
  <text x="450" y="115" text-anchor="middle" fill="white" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" opacity="0.8">Telegram bot for Interactive Brokers</text>
  <g fill="white" opacity="0.1">
    <circle cx="810" cy="40" r="3"/><circle cx="830" cy="40" r="3"/><circle cx="850" cy="40" r="3"/>
    <circle cx="810" cy="60" r="3"/><circle cx="830" cy="60" r="3"/><circle cx="850" cy="60" r="3"/>
    <circle cx="810" cy="80" r="3"/><circle cx="830" cy="80" r="3"/><circle cx="850" cy="80" r="3"/>
    <circle cx="810" cy="140" r="3"/><circle cx="830" cy="140" r="3"/><circle cx="850" cy="140" r="3"/>
    <circle cx="810" cy="160" r="3"/><circle cx="830" cy="160" r="3"/><circle cx="850" cy="160" r="3"/>
  </g>
</svg>
