name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Bump patch version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Get latest tag and bump patch
        id: bump
        run: |
          LATEST=$(git tag -l "v*" --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            echo "new_tag=v0.0.1" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Strip v prefix, split into major.minor.patch
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          echo "new_tag=v${MAJOR}.${MINOR}.${NEW_PATCH}" >> $GITHUB_OUTPUT

      - name: Sync pyproject.toml version and create tag
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          VERSION="${NEW_TAG#v}"
          # Tag the current HEAD BEFORE the version bump.
          # This ensures the tag points to a commit without [skip ci],
          # so the tag push triggers Docker Publish.
          git tag "$NEW_TAG"
          CURRENT=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$CURRENT" != "$VERSION" ]; then
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pyproject.toml
            git commit -m "chore: bump version to $NEW_TAG [skip ci]"
            git push origin main
          fi
          git push origin "$NEW_TAG"
