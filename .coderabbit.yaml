language: "en-US"
tone_instructions: "Be direct and concise. No fluff."

reviews:
  profile: "chill"
  high_level_summary: true
  collapse_walkthrough: true
  poem: false
  sequence_diagrams: false
  suggested_reviewers: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT REVIEW"
  path_filters:
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!data/**"
  path_instructions:
    - path: "src/**"
      instructions: |
        Check for proper async/await usage and connection cleanup.
        Verify IBKR API calls handle timeouts and disconnections.
        Ensure no secrets or PII are logged.
        Financial calculations must use consistent currency (EUR vs USD).
    - path: "src/executor.py"
      instructions: |
        This handles real money. Double-check order sizing, safety limits,
        and that NaN/zero prices never reach order placement.
    - path: "src/db.py"
      instructions: |
        Verify SQL queries are parameterized (no string interpolation).
        Check for proper async connection handling.
    - path: "Dockerfile*"
      instructions: |
        Verify non-root USER is set. Ensure base image tags are pinned.
    - path: "docker-compose*.yml"
      instructions: |
        Check that sensitive values use environment variables, not hardcoded.
  tools:
    gitleaks:
      enabled: true
    hadolint:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "local"
  code_guidelines:
    enabled: true
    filePatterns:
      - "AGENTS.md"
      - "CLAUDE.md"
